<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/valeria_logo.png" type="image/png">
  <title>Valeria Card Kingdoms Wiki</title>
  <meta name="description" content="Browse every card in the Valeria Card Kingdoms Online database. Citizens, monsters, domains, dukes, and starters with full stats and effects.">
  <link rel="stylesheet" href="/static/wiki/style.css">
</head>
<body>
  <header class="wiki-header">
    <div class="wiki-header-inner">
      <a class="wiki-brand" href="/wiki">
        <img class="wiki-brand-logo" src="/images/valeria_logo.png" alt="">
        <div class="wiki-brand-text">
          <span class="wiki-brand-title">Valeria Card Kingdoms Wiki</span>
        </div>
      </a>
      <div class="wiki-header-actions">
        <a class="wiki-headlink" href="/">Play</a>
        <a class="wiki-headlink" href="/counter">Counter</a>
      </div>
    </div>
    <nav class="wiki-tabs" id="wiki-tabs"></nav>
    <details class="wiki-filters-wrap" id="wiki-filters-wrap">
      <summary class="wiki-filters-summary">
        <span class="wiki-filters-summary-label">Search &amp; filters</span>
        <span class="wiki-filters-count" id="wiki-filters-count" aria-hidden="true"></span>
        <span class="wiki-filters-chevron" aria-hidden="true"></span>
      </summary>
      <div class="wiki-filters-body">
        <input
          id="wiki-search"
          class="wiki-search"
          type="search"
          placeholder="Search by name, effect text, expansion..."
          autocomplete="off"
          spellcheck="false"
        />
        <div class="wiki-filters" id="wiki-filters"></div>
      </div>
    </details>
    <div class="wiki-status" id="wiki-status">Loading card data...</div>
  </header>

  <main class="wiki-main">
    <div id="wiki-grid" class="wiki-grid" aria-live="polite"></div>
    <p id="wiki-empty" class="wiki-empty" hidden>No cards match your filters.</p>
  </main>

  <div id="wiki-modal" class="wiki-modal-backdrop" aria-hidden="true">
    <div class="wiki-modal" role="dialog" aria-modal="true" aria-labelledby="wiki-modal-title">
      <button type="button" class="wiki-modal-close" id="wiki-modal-close" aria-label="Close">&times;</button>
      <div class="wiki-modal-body" id="wiki-modal-body"></div>
    </div>
  </div>

  <footer class="wiki-footer">
    <span>Read-only view of the <code>vckonline</code> MariaDB tables.</span>
    <span>
      Banned cards show a <span class="wiki-banned-badge">Banned</span> badge.
      Cards with a flagged special whose text is empty show an <span class="wiki-badge unimplemented">Unimplemented</span> badge.
    </span>
  </footer>

  <script src="/static/wiki/wiki.js"></script>
</body>
</html>
