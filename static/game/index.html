<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/images/valeria_logo.png" type="image/png">
  <title>Valeria Card Kingdoms Online — Free in your browser</title>
  <meta name="description" content="Play Valeria Card Kingdoms online in your browser for free. Multiplayer lobby—no account or payment required.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Valeria Card Kingdoms Online — Free in your browser">
  <meta property="og:description" content="Play Valeria Card Kingdoms online in your browser for free. Multiplayer lobby—no account or payment required.">
  <meta property="og:image" content="/images/valeria_logo.png">
  <link rel="stylesheet" href="/static/game/style.css">
</head>
<body>
  <noscript>
    <p>Valeria Card Kingdoms Online — play the board game free in your browser with friends. No account or payment required; enable JavaScript to open the lobby and play.</p>
  </noscript>
  <div class="board" id="board" data-layout="p2" data-player-count="2">
    <div class="game-layout">
      <div class="gl-top" id="gl-top"></div>
      <div class="gl-mid" id="gl-mid">
        <aside class="gl-side gl-side-l" id="gl-side-l"></aside>
        <div class="gl-center" id="gl-center">
          <div class="center-board" id="zone-center"></div>
        </div>
        <aside class="gl-side gl-side-r" id="gl-side-r"></aside>
      </div>
      <div class="gl-bottom" id="gl-bottom"></div>
    </div>
  </div>
  <div id="conn-status" class="conn-status"></div>
  <div id="player-detail-modal" class="player-detail-backdrop" aria-hidden="true">
    <div class="player-detail-panel" role="dialog" aria-modal="true" aria-labelledby="player-detail-title">
      <div class="player-detail-header">
        <h2 class="player-detail-title" id="player-detail-title">Player</h2>
        <button type="button" class="player-detail-close" id="player-detail-close" aria-label="Close">Close</button>
      </div>
      <div class="player-detail-body" id="player-detail-body"></div>
    </div>
  </div>
  <div id="lobby-overlay" class="lobby-overlay" aria-hidden="true">
    <div class="lobby-sheet" role="dialog" aria-modal="true" aria-labelledby="lobby-title">
      <div class="lobby-brand">
        <h1 id="lobby-title" class="lobby-title">Valeria Card Kingdoms Online</h1>
        <p class="lobby-tagline">Free in your browser and no account needed. Join the lobby and ready up when your group is here.</p>
      </div>
      <div id="lobby-error" class="lobby-error lobby-hidden" role="alert"></div>
      <div id="lobby-step-join" class="lobby-step">
        <label class="lobby-label" for="lobby-display-name">Display name</label>
        <div class="lobby-join-row">
          <input id="lobby-display-name" class="lobby-input" type="text" maxlength="40" placeholder="Your name" autocomplete="nickname" />
          <button type="button" id="lobby-join-btn" class="lobby-btn lobby-btn-primary">Join lobby</button>
        </div>
      </div>
      <div id="lobby-step-wait" class="lobby-step lobby-hidden">
        <p class="lobby-hint">Need at least two players. Everyone taps ready to start.</p>
        <ul id="lobby-player-list" class="lobby-player-list"></ul>
        <div class="lobby-actions">
          <button type="button" id="lobby-ready-btn" class="lobby-btn lobby-btn-ready">Ready</button>
          <button type="button" id="lobby-leave-btn" class="lobby-btn lobby-btn-ghost">Leave</button>
        </div>
      </div>
      <div class="lobby-footer">
        <span id="lobby-live" class="lobby-live lobby-live--warn" aria-live="polite">Connecting…</span>
        <p id="lobby-meta" class="lobby-meta"></p>
      </div>
    </div>
  </div>
  <script src="/static/shared/vck_client_meta.js"></script>
  <script src="/static/game/game.js"></script>
</body>
</html>
