<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="/images/valeria_logo.png" type="image/png">
  <title>VCK Token Counter</title>
  <link rel="stylesheet" href="/static/counter/counter.css">
</head>
<body class="counter-body">
  <main class="counter-shell">
    <div id="counter-rows" class="counter-rows" aria-live="polite"></div>
    <div class="counter-toolbar">
      <button type="button" id="counter-reset-scores" class="counter-reset-btn">Reset scores</button>
    </div>
    <div class="counter-hint">Hint: Tap the value to edit. Supports addition and subtraction operations.</div>
  </main>
  <script src="/static/shared/vck_client_meta.js"></script>
  <script src="/static/counter/counter.js"></script>
</body>
</html>
